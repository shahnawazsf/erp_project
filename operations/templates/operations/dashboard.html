{% extends 'base.html' %}
{% block title %}Operations Dashboard{% endblock %}
{% block content %}

<div class="container-fluid py-4">
    <h4 class="mb-4">Operations Dashboard</h4>

    <!-- Card 1: Container Received & Shipped Dynamic Line Chart -->
    <div class="row mb-4">
        <div class="col-md-12 mb-3">
            <div class="card">
                <div class="card-header bg-light">
                    <h6 class="mb-0">📦 Containers Received & Shipped For {% now "F Y" %}</h6>
                </div>
                <div class="card-body">
                    <div id="containerLineChart"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Card 2: Container Received by Year 3D Bar Chart -->
    <div class="row mb-4">
        <div class="col-md-12 mb-3">
            <div class="card">
                <div class="card-header bg-light">
                    <h6 class="mb-0">📊 Containers Received by Year (3D Dynamic View)</h6>
                </div>
                <div class="card-body">
                    <div id="containerYearBarChart"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Future Cards will be added here -->

</div>

<!-- ApexCharts Library - Modern, Dynamic, 3D Capable -->
<script src="https://cdn.jsdelivr.net/npm/apexcharts@latest/dist/apexcharts.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {

    // ==========================================
    // CHART 1: Dynamic Line Chart
    // ==========================================
    const lineChartDataJson = '{{ container_chart_data|safe }}';
    const lineChartData = JSON.parse(lineChartDataJson);

    if (lineChartData.labels && lineChartData.labels.length > 0) {
        const lineChartOptions = {
            series: [
                {
                    name: 'Received',
                    data: lineChartData.recvd_data,
                    color: '#27a745'
                },
                {
                    name: 'Shipped',
                    data: lineChartData.shipped_data,
                    color: '#007bff'
                }
            ],
            chart: {
                type: 'line',
                height: 400,
                toolbar: {
                    show: true,
                    tools: {
                        download: true,
                        selection: true,
                        zoom: true,
                        zoomin: true,
                        zoomout: true,
                        pan: true,
                        reset: true
                    }
                },
                zoom: {
                    enabled: true,
                    type: 'xy'
                },
                animations: {
                    enabled: true,
                    speed: 800,
                    animateGradually: {
                        enabled: true,
                        delay: 150
                    },
                    dynamicAnimation: {
                        enabled: true,
                        speed: 150
                    }
                }
            },
            stroke: {
                curve: 'smooth',
                width: 3,
                lineCap: 'round'
            },
            markers: {
                size: 6,
                colors: ['#27a745', '#007bff'],
                strokeWidth: 2,
                strokeColors: ['#fff', '#fff'],
                hover: {
                    size: 8
                }
            },
            xaxis: {
                categories: lineChartData.labels,
                title: {
                    text: 'Day of Month',
                    style: {
                        fontSize: '12px',
                        fontWeight: 'bold',
                        color: '#1a2035'
                    }
                },
                axisBorder: {
                    show: true,
                    color: '#e9ecef'
                },
                grid: {
                    show: false
                }
            },
            yaxis: {
                title: {
                    text: 'Count',
                    style: {
                        fontSize: '12px',
                        fontWeight: 'bold',
                        color: '#1a2035'
                    }
                },
                axisBorder: {
                    show: true
                }
            },
            grid: {
                borderColor: '#e9ecef',
                strokeDashArray: 0,
                xaxis: {
                    lines: {
                        show: true
                    }
                }
            },
            tooltip: {
                theme: 'dark',
                x: {
                    formatter: function(value) {
                        return 'Day ' + value;
                    }
                },
                y: {
                    formatter: function(value) {
                        return value + ' containers';
                    }
                }
            },
            legend: {
                position: 'top',
                horizontalAlign: 'right',
                fontSize: 13,
                fontFamily: 'Segoe UI',
                markers: {
                    width: 12,
                    height: 12,
                    radius: 2
                }
            }
        };

        new ApexCharts(document.querySelector("#containerLineChart"), lineChartOptions).render();
    }

    // ==========================================
    // CHART 2: 3D Dynamic Bar Chart
    // ==========================================
    const barChartDataJson = '{{ container_year_chart_data|safe }}';
    const barChartData = JSON.parse(barChartDataJson);

    if (barChartData.labels && barChartData.labels.length > 0) {
        const barChartOptions = {
            series: [
                {
                    name: 'Containers Received',
                    data: barChartData.qty_data
                }
            ],
            chart: {
                type: 'bar',
                height: 400,
                toolbar: {
                    show: true,
                    tools: {
                        download: true,
                        selection: true,
                        zoom: true,
                        zoomin: true,
                        zoomout: true,
                        pan: true,
                        reset: true
                    }
                },
                animations: {
                    enabled: true,
                    speed: 1000,
                    animateGradually: {
                        enabled: true,
                        delay: 150
                    },
                    dynamicAnimation: {
                        enabled: true,
                        speed: 150
                    }
                }
            },
            plotOptions: {
                bar: {
                    horizontal: false,
                    columnWidth: '60%',
                    borderRadius: 5,
                    dataLabels: {
                        position: 'top'
                    },
                    // 3D Effect
                    distributed: true,
                    borderRadiusApplication: 'end'
                }
            },
            dataLabels: {
                enabled: true,
                offsetY: -20,
                style: {
                    fontSize: '12px',
                    fontWeight: 'bold',
                    colors: ['#1a2035']
                },
                formatter: function(value) {
                    return value.toLocaleString();
                }
            },
            colors: [
                '#4FC3F7',
                '#27a745',
                '#FFC107',
                '#FF5722',
                '#9C27B0'
            ],
            xaxis: {
                categories: barChartData.labels,
                title: {
                    text: 'Year',
                    style: {
                        fontSize: '12px',
                        fontWeight: 'bold',
                        color: '#1a2035'
                    }
                },
                axisBorder: {
                    show: true,
                    color: '#e9ecef'
                }
            },
            yaxis: {
                title: {
                    text: 'Quantity',
                    style: {
                        fontSize: '12px',
                        fontWeight: 'bold',
                        color: '#1a2035'
                    }
                },
                labels: {
                    formatter: function(value) {
                        return value.toLocaleString();
                    }
                }
            },
            grid: {
                borderColor: '#e9ecef',
                strokeDashArray: 0,
                yaxis: {
                    lines: {
                        show: true
                    }
                }
            },
            tooltip: {
                theme: 'dark',
                y: {
                    formatter: function(value) {
                        return value.toLocaleString() + ' containers';
                    }
                }
            },
            legend: {
                position: 'top',
                horizontalAlign: 'right',
                fontSize: 13,
                fontFamily: 'Segoe UI'
            }
        };

        new ApexCharts(document.querySelector("#containerYearBarChart"), barChartOptions).render();
    }
});
</script>

{% endblock %}
