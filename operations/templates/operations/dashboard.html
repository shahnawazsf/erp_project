{% extends 'base.html' %}
{% block title %}Operations Dashboard{% endblock %}
{% block content %}

<div class="container-fluid py-4">
    <h4 class="mb-4">Operations Dashboard</h4>

    <!-- Card 1: Container Received & Shipped Line Chart -->
    <div class="row mb-4">
        <div class="col-md-12 mb-3">
            <div class="card">
                <div class="card-header bg-light">
                    <h6 class="mb-0">📦 Containers Received & Shipped For {% now "F Y" %}</h6>
                </div>
                <div class="card-body">
                    <canvas id="containerChart" height="80"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Card 2: Container Received by Year Bar Chart -->
    <div class="row mb-4">
        <div class="col-md-12 mb-3">
            <div class="card">
                <div class="card-header bg-light">
                    <h6 class="mb-0">📊 Containers Received by Year (Last 3 Years)</h6>
                </div>
                <div class="card-body">
                    <canvas id="containerYearChart" height="80"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Future Cards will be added here -->

</div>

<!-- Include Chart.js Library -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Parse data from Django context
    const chartDataJson = '{{ container_chart_data|safe }}';
    const chartData = JSON.parse(chartDataJson);

    // Get canvas element
    const ctx = document.getElementById('containerChart');

    if (!ctx) return;

    // Create line chart with professional styling
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: chartData.labels,
            datasets: [
                {
                    label: 'Received',
                    data: chartData.recvd_data,
                    borderColor: '#27a745', // Green
                    backgroundColor: 'rgba(39, 167, 69, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5,
                    pointBackgroundColor: '#27a745',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointHoverRadius: 7,
                    pointHoverBackgroundColor: '#20c997',
                },
                {
                    label: 'Shipped',
                    data: chartData.shipped_data,
                    borderColor: '#007bff', // Blue
                    backgroundColor: 'rgba(0, 123, 255, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5,
                    pointBackgroundColor: '#007bff',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointHoverRadius: 7,
                    pointHoverBackgroundColor: '#0056b3',
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    display: true,
                    position: 'top',
                    labels: {
                        font: {
                            size: 13,
                            weight: 'bold'
                        },
                        padding: 20,
                        usePointStyle: true,
                        pointStyle: 'circle',
                        color: '#1a2035'
                    }
                },
                tooltip: {
                    backgroundColor: 'rgba(26, 32, 53, 0.8)',
                    padding: 12,
                    titleFont: { size: 13, weight: 'bold' },
                    bodyFont: { size: 12 },
                    borderColor: '#e9ecef',
                    borderWidth: 1,
                    displayColors: true,
                    callbacks: {
                        label: function(context) {
                            return context.dataset.label + ': ' + context.parsed.y + ' containers';
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        font: { size: 11 },
                        color: '#6c757d',
                        callback: function(value) {
                            return value;
                        }
                    },
                    title: {
                        display: true,
                        text: 'Count',
                        font: { size: 12, weight: 'bold' },
                        color: '#1a2035'
                    },
                    grid: {
                        color: 'rgba(0, 0, 0, 0.05)',
                        drawBorder: false
                    }
                },
                x: {
                    ticks: {
                        font: { size: 11 },
                        color: '#6c757d'
                    },
                    title: {
                        display: true,
                        text: 'Day of Month',
                        font: { size: 12, weight: 'bold' },
                        color: '#1a2035'
                    },
                    grid: {
                        display: false,
                        drawBorder: false
                    }
                }
            }
        }
    });

    // Chart 2: Yearly Container Bar Chart
    const yearChartDataJson = '{{ container_year_chart_data|safe }}';
    const yearChartData = JSON.parse(yearChartDataJson);
    const ctxYear = document.getElementById('containerYearChart');

    if (ctxYear) {
        new Chart(ctxYear, {
            type: 'bar',
            data: {
                labels: yearChartData.labels,
                datasets: [{
                    label: 'Containers Received',
                    data: yearChartData.qty_data,
                    backgroundColor: [
                        'rgba(79, 195, 247, 0.8)',
                        'rgba(39, 167, 69, 0.8)',
                        'rgba(255, 193, 7, 0.8)'
                    ],
                    borderColor: [
                        '#007bff',
                        '#27a745',
                        '#ffc107'
                    ],
                    borderWidth: 2,
                    borderRadius: 5,
                    hoverBackgroundColor: [
                        'rgba(79, 195, 247, 1)',
                        'rgba(39, 167, 69, 1)',
                        'rgba(255, 193, 7, 1)'
                    ]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                indexAxis: 'x',
                plugins: {
                    legend: {
                        display: true,
                        position: 'top',
                        labels: {
                            font: { size: 13, weight: 'bold' },
                            padding: 20,
                            color: '#1a2035'
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(26, 32, 53, 0.8)',
                        padding: 12,
                        titleFont: { size: 13, weight: 'bold' },
                        bodyFont: { size: 12 },
                        borderColor: '#e9ecef',
                        borderWidth: 1,
                        displayColors: true,
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' +
                                       context.parsed.y.toLocaleString() + ' containers';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            font: { size: 11 },
                            color: '#6c757d',
                            callback: function(value) {
                                return value.toLocaleString();
                            }
                        },
                        title: {
                            display: true,
                            text: 'Quantity',
                            font: { size: 12, weight: 'bold' },
                            color: '#1a2035'
                        },
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)',
                            drawBorder: false
                        }
                    },
                    x: {
                        ticks: {
                            font: { size: 11 },
                            color: '#6c757d'
                        },
                        title: {
                            display: true,
                            text: 'Year',
                            font: { size: 12, weight: 'bold' },
                            color: '#1a2035'
                        },
                        grid: {
                            display: false,
                            drawBorder: false
                        }
                    }
                }
            }
        });
    }
});
</script>

{% endblock %}
