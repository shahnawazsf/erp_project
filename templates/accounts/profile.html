{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h4><i class="bi bi-person-circle me-2"></i>My Profile</h4>
</div>
<div class="row">
    <div class="col-md-4">
        <div class="card p-4 text-center">
            {% if user.avatar %}
            <img src="{{ user.avatar.url }}" class="rounded-circle mb-3" width="100" height="100" style="object-fit:cover;">
            {% else %}
            <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3"
                 style="width:100px;height:100px;">
                <i class="bi bi-person-fill text-white" style="font-size:3rem;"></i>
            </div>
            {% endif %}
            <h5 class="fw-bold">{{ user.get_full_name|default:user.username }}</h5>
            <span class="badge bg-primary">{{ user.get_role_display }}</span>
            <p class="text-muted mt-2 small">{{ user.email }}</p>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card p-4">
            <h6 class="fw-bold mb-3">Edit Profile</h6>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ user.phone }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Avatar</label>
                        <input type="file" name="avatar" class="form-control" accept="image/*">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">
                    <i class="bi bi-save me-1"></i>Save Changes
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
