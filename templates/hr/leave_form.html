{% extends 'base.html' %}
{% block title %}Apply Leave{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h4><i class="bi bi-calendar-plus me-2"></i>Apply for Leave</h4>
    <a href="{% url 'hr_leaves' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card p-4" style="max-width:600px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold">Employee</label>
            <select name="employee" class="form-select" required>
                <option value="">Select Employee</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}">{{ emp.employee_id }} - {{ emp.user.get_full_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Leave Type</label>
            <select name="leave_type" class="form-select" required>
                <option value="annual">Annual</option>
                <option value="sick">Sick</option>
                <option value="unpaid">Unpaid</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label fw-semibold">Start Date</label>
                <input type="date" name="start_date" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">End Date</label>
                <input type="date" name="end_date" class="form-control" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Reason</label>
            <textarea name="reason" class="form-control" rows="3" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary me-2"><i class="bi bi-send me-1"></i>Submit</button>
        <a href="{% url 'hr_leaves' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
