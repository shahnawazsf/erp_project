{% extends 'base.html' %}
{% block title %}Add Employee{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h4><i class="bi bi-person-plus me-2"></i>Add Employee</h4>
    <a href="{% url 'hr_employees' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back
    </a>
</div>
<div class="card p-4">
    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-semibold">Employee ID</label>
                <input type="text" name="employee_id" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Designation</label>
                <input type="text" name="designation" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Department</label>
                <select name="department" class="form-select">
                    <option value="">Select Department</option>
                    {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Hire Date</label>
                <input type="date" name="hire_date" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Salary</label>
                <input type="number" name="salary" class="form-control" step="0.01" min="0">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Status</label>
                <select name="status" class="form-select">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                    <option value="on_leave">On Leave</option>
                </select>
            </div>
            <div class="col-12">
                <label class="form-label fw-semibold">Address</label>
                <textarea name="address" class="form-control" rows="2"></textarea>
            </div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary me-2">
                <i class="bi bi-save me-1"></i>Save Employee
            </button>
            <a href="{% url 'hr_employees' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
