{% extends 'base.html' %}
{% block title %}New Invoice{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h4><i class="bi bi-receipt me-2"></i>New Invoice</h4>
    <a href="{% url 'finance_invoices' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card p-4">
    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label fw-semibold">Invoice Number</label><input type="text" name="invoice_number" class="form-control" required></div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Type</label>
                <select name="invoice_type" class="form-select" required>
                    <option value="sales">Sales Invoice</option>
                    <option value="purchase">Purchase Invoice</option>
                </select>
            </div>
            <div class="col-md-6"><label class="form-label fw-semibold">Party Name</label><input type="text" name="party_name" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Party Email</label><input type="email" name="party_email" class="form-control"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Issue Date</label><input type="date" name="issue_date" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Due Date</label><input type="date" name="due_date" class="form-control" required></div>
            <div class="col-md-4"><label class="form-label fw-semibold">Subtotal</label><input type="number" name="subtotal" class="form-control" step="0.01" value="0"></div>
            <div class="col-md-4"><label class="form-label fw-semibold">Tax Amount</label><input type="number" name="tax_amount" class="form-control" step="0.01" value="0"></div>
            <div class="col-md-4"><label class="form-label fw-semibold">Total Amount</label><input type="number" name="total_amount" class="form-control" step="0.01" value="0"></div>
            <div class="col-12"><label class="form-label fw-semibold">Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary me-2"><i class="bi bi-save me-1"></i>Save Invoice</button>
            <a href="{% url 'finance_invoices' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
