{% extends 'base.html' %}
{% block title %}Add Expense{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h4><i class="bi bi-credit-card me-2"></i>Add Expense</h4>
    <a href="{% url 'finance_expenses' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card p-4" style="max-width:600px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-12"><label class="form-label fw-semibold">Title</label><input type="text" name="title" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Category</label><input type="text" name="category" class="form-control" required placeholder="e.g. Travel, Office Supplies"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Amount</label><input type="number" name="amount" class="form-control" step="0.01" min="0" required></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Date</label><input type="date" name="date" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Submitted By</label><input type="text" name="submitted_by" class="form-control" value="{{ request.user.get_full_name }}" required></div>
            <div class="col-12"><label class="form-label fw-semibold">Description</label><textarea name="description" class="form-control" rows="2"></textarea></div>
            <div class="col-12"><label class="form-label fw-semibold">Receipt</label><input type="file" name="receipt" class="form-control"></div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary me-2"><i class="bi bi-save me-1"></i>Submit Expense</button>
            <a href="{% url 'finance_expenses' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
