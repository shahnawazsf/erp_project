{% extends 'base.html' %}
{% block title %}Add Product{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h4><i class="bi bi-plus-square me-2"></i>Add Product</h4>
    <a href="{% url 'inventory_products' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card p-4">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label fw-semibold">Product Code</label><input type="text" name="code" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Name</label><input type="text" name="name" class="form-control" required></div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Category</label>
                <select name="category" class="form-select">
                    <option value="">Select Category</option>
                    {% for cat in categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Unit</label>
                <select name="unit" class="form-select">
                    <option value="pcs">Pieces</option><option value="kg">Kilogram</option>
                    <option value="ltr">Litre</option><option value="mtr">Meter</option>
                    <option value="box">Box</option><option value="set">Set</option>
                </select>
            </div>
            <div class="col-md-4"><label class="form-label fw-semibold">Cost Price</label><input type="number" name="cost_price" class="form-control" step="0.01" min="0"></div>
            <div class="col-md-4"><label class="form-label fw-semibold">Sale Price</label><input type="number" name="sale_price" class="form-control" step="0.01" min="0"></div>
            <div class="col-md-4"><label class="form-label fw-semibold">Reorder Level</label><input type="number" name="reorder_level" class="form-control" value="10"></div>
            <div class="col-12"><label class="form-label fw-semibold">Description</label><textarea name="description" class="form-control" rows="2"></textarea></div>
            <div class="col-12"><label class="form-label fw-semibold">Image</label><input type="file" name="image" class="form-control" accept="image/*"></div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary me-2"><i class="bi bi-save me-1"></i>Save Product</button>
            <a href="{% url 'inventory_products' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
