{% extends 'base.html' %}
{% block title %}New Purchase Order{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h4><i class="bi bi-bag-plus me-2"></i>New Purchase Order</h4>
    <a href="{% url 'purchasing_orders' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card p-4">
    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label fw-semibold">PO Number</label><input type="text" name="order_number" class="form-control" required></div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Supplier</label>
                <select name="supplier" class="form-select" required>
                    <option value="">Select Supplier</option>
                    {% for s in suppliers %}<option value="{{ s.id }}">{{ s.code }} - {{ s.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="col-md-6"><label class="form-label fw-semibold">Order Date</label><input type="date" name="order_date" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Expected Date</label><input type="date" name="expected_date" class="form-control"></div>
            <div class="col-12"><label class="form-label fw-semibold">Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary me-2"><i class="bi bi-save me-1"></i>Create PO</button>
            <a href="{% url 'purchasing_orders' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
