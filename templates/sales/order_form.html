{% extends 'base.html' %}
{% block title %}New Sales Order{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h4><i class="bi bi-cart-plus me-2"></i>New Sales Order</h4>
    <a href="{% url 'sales_orders' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card p-4">
    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label fw-semibold">Order Number</label><input type="text" name="order_number" class="form-control" required></div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Customer</label>
                <select name="customer" class="form-select" required>
                    <option value="">Select Customer</option>
                    {% for c in customers %}<option value="{{ c.id }}">{{ c.code }} - {{ c.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="col-md-6"><label class="form-label fw-semibold">Order Date</label><input type="date" name="order_date" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Delivery Date</label><input type="date" name="delivery_date" class="form-control"></div>
            <div class="col-12"><label class="form-label fw-semibold">Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary me-2"><i class="bi bi-save me-1"></i>Create Order</button>
            <a href="{% url 'sales_orders' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
